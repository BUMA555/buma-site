<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5CC8FF" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#0F1624"/>
  <rect x="40" y="36" width="1120" height="90" rx="20" fill="#111827" stroke="url(#cardGlow)"/>
  <text x="80" y="84" fill="#F8FAFC" font-size="28" font-weight="700" font-family="Arial, sans-serif">服务案例页结构一图看懂</text>
  <text x="80" y="112" fill="#A0A6B8" font-size="16" font-family="Arial, sans-serif">挑战 → 方案 → 结果 → 复用 → 下一步</text>

  <g>
    <rect x="40" y="150" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="70" y="188" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">1. 选择典型客户</text>
    <text x="70" y="218" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">明确行业 / 规模 / 阶段</text>
    <text x="70" y="244" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">保证代表性与可信度</text>
  </g>

  <g>
    <rect x="430" y="150" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="460" y="188" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">2. 讲清挑战</text>
    <text x="460" y="218" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">客户卡点 / 目标 / 约束</text>
    <text x="460" y="244" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">用真实细节代替空话</text>
  </g>

  <g>
    <rect x="820" y="150" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="850" y="188" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">3. 展示方案</text>
    <text x="850" y="218" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">交付清单 / 时间节奏</text>
    <text x="850" y="244" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">强调可执行动作</text>
  </g>

  <g>
    <rect x="40" y="320" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="70" y="358" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">4. 结果证据</text>
    <text x="70" y="388" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">数据 / 截图 / 客户评价</text>
    <text x="70" y="414" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">避免只讲感觉</text>
  </g>

  <g>
    <rect x="430" y="320" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="460" y="358" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">5. 可复制流程</text>
    <text x="460" y="388" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">关键步骤 / 模板 / 节点</text>
    <text x="460" y="414" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">方便客户判断能否复用</text>
  </g>

  <g>
    <rect x="820" y="320" width="340" height="140" rx="18" fill="#111827" stroke="url(#cardGlow)"/>
    <text x="850" y="358" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, sans-serif">6. 下一步 CTA</text>
    <text x="850" y="388" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">怎么确认 / 如何联系</text>
    <text x="850" y="414" fill="#A0A6B8" font-size="15" font-family="Arial, sans-serif">把阅读转成咨询动作</text>
  </g>
</svg>
