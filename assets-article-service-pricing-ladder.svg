<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)" />
  <text x="80" y="90" fill="#E2E8F0" font-size="36" font-family="Arial" font-weight="700">服务报价三档结构</text>
  <text x="80" y="130" fill="#94A3B8" font-size="20" font-family="Arial">把范围、价值与边界放进报价，客户更容易做选择</text>

  <rect x="90" y="180" width="320" height="440" rx="24" fill="#38BDF8" />
  <rect x="440" y="140" width="320" height="480" rx="24" fill="#F59E0B" />
  <rect x="790" y="100" width="320" height="520" rx="24" fill="#22C55E" />

  <text x="130" y="240" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">起步档</text>
  <text x="130" y="280" fill="#0F172A" font-size="20" font-family="Arial">最小可交付</text>
  <text x="130" y="330" fill="#0F172A" font-size="18" font-family="Arial">- 需求澄清</text>
  <text x="130" y="370" fill="#0F172A" font-size="18" font-family="Arial">- 建议清单</text>
  <text x="130" y="410" fill="#0F172A" font-size="18" font-family="Arial">- 3-5 天</text>

  <text x="480" y="200" fill="#111827" font-size="28" font-family="Arial" font-weight="700">标准档</text>
  <text x="480" y="240" fill="#111827" font-size="20" font-family="Arial">主推承接</text>
  <text x="480" y="290" fill="#111827" font-size="18" font-family="Arial">- 完整方案</text>
  <text x="480" y="330" fill="#111827" font-size="18" font-family="Arial">- 执行节奏</text>
  <text x="480" y="370" fill="#111827" font-size="18" font-family="Arial">- 复盘优化</text>

  <text x="830" y="170" fill="#052E16" font-size="28" font-family="Arial" font-weight="700">定制档</text>
  <text x="830" y="210" fill="#052E16" font-size="20" font-family="Arial">高客单陪跑</text>
  <text x="830" y="260" fill="#052E16" font-size="18" font-family="Arial">- 全链路交付</text>
  <text x="830" y="300" fill="#052E16" font-size="18" font-family="Arial">- 长期迭代</text>
  <text x="830" y="340" fill="#052E16" font-size="18" font-family="Arial">- 定制边界</text>

  <text x="90" y="660" fill="#94A3B8" font-size="18" font-family="Arial">提示：报价 = 成本底线 + 价值感知 + 风险边界</text>
</svg>
