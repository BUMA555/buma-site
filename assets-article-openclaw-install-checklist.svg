  <text x="110" y="155" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">OpenClaw 安装与网关检查清单</text>
  <text x="110" y="198" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="24">先安装，再 onboard，再看 gateway status，最后打开 dashboard。</text>

  <g>
    <rect x="110" y="252" width="196" height="250" rx="24" fill="#0F1624" stroke="#2D3D57"/>
