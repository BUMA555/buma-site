    <text x="332" y="404" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">Windows 用 install.ps1</text>
    <text x="332" y="434" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">再跑 onboard 向导</text>
    <text x="332" y="472" fill="#5CC8FF" font-family="Consolas, monospace" font-size="20">openclaw onboard</text>
