      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paint1_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 122) rotate(90) scale(122)">
      <stop stop-color="#5CC8FF"/>
      <stop offset="1" stop-color="#5CC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paint2_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 622) rotate(90) scale(170)">
      <stop stop-color="#5BE3B4"/>
      <stop offset="1" stop-color="#5BE3B4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paint3_linear" x1="330" y1="374" x2="840" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CC8FF"/>
      <stop offset="0.5" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5BE3B4"/>
    </linearGradient>
