  <text x="150" y="517" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">im.message.receive_v1</text>

  <text x="470" y="452" fill="#7C5CFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">05</text>
  <text x="470" y="485" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">网关检查</text>
  <text x="470" y="517" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">gateway status + logs</text>

  <text x="790" y="452" fill="#5CC8FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">06</text>
