  <rect x="80" y="86" width="1040" height="548" rx="28" fill="#111827" stroke="#2A3447" stroke-width="2"/>

  <text x="120" y="150" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">OpenClaw 飞书咨询承接 6 步</text>
  <text x="120" y="190" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="22">入口明确、配置可通、分流清楚、下一步可执行</text>

  <rect x="120" y="230" width="260" height="150" rx="22" fill="#121826" stroke="#3E4B67"/>
  <rect x="440" y="230" width="260" height="150" rx="22" fill="#121826" stroke="#3E4B67"/>
