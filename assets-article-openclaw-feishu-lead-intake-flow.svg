  <rect x="760" y="410" width="260" height="150" rx="22" fill="#121826" stroke="#3E4B67"/>

  <text x="150" y="272" fill="#7C5CFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">01</text>
  <text x="150" y="305" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">定义入口</text>
  <text x="150" y="337" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">先确定咨询问题类型</text>

  <text x="470" y="272" fill="#5CC8FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">02</text>
  <text x="470" y="305" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">跑通安装</text>
  <text x="470" y="337" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">openclaw onboard</text>

  <text x="790" y="272" fill="#5BE3B4" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">03</text>
  <text x="790" y="305" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">飞书应用</text>
  <text x="790" y="337" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">准备 App ID/Secret</text>

  <text x="150" y="452" fill="#F0B9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">04</text>
