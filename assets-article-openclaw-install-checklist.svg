    <text x="554" y="404" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">先确认服务是否在跑</text>
    <text x="554" y="434" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">别盲猜“是不是装坏了”</text>
