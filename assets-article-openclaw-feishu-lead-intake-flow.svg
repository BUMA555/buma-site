  <text x="790" y="517" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">给出清楚下一步</text>

  <rect x="120" y="588" width="900" height="46" rx="16" fill="#0F1624" stroke="#273349"/>
  <text x="146" y="618" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">目标不是“机器人能答”，而是“咨询能被推进”。</text>

