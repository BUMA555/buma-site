    <text x="110" y="404" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">Node 24 推荐</text>
    <text x="110" y="434" fill="#A0A6B8" font-family="Segoe UI, Arial, sans-serif" font-size="21">Node 22.16+ 兼容</text>
